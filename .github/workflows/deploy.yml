name: Deploy FeriDW Portfolio to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Safety: remove public/index.html if it was accidentally re-committed.
      # This file overwrites dist/client/index.html during the Vite build.
      - name: Remove public/index.html if present
        run: |
          if [ -f "public/index.html" ]; then
            echo "WARNING: public/index.html found — removing before build."
            rm -f public/index.html
          else
            echo "OK: public/index.html not present."
          fi

      - name: Build project (+ generate static index.html via postbuild)
        run: npm run build

      - name: Detect build output folder
        id: output
        shell: bash
        run: |
          echo "Checking build output..."
          if [ -d "dist/client" ]; then
            echo "dir=dist/client/" >> "$GITHUB_OUTPUT"
            echo "Using dist/client/"
          elif [ -d ".output/public" ]; then
            echo "dir=.output/public/" >> "$GITHUB_OUTPUT"
            echo "Using .output/public/"
          elif [ -d "dist" ]; then
            echo "dir=dist/" >> "$GITHUB_OUTPUT"
            echo "Using dist/"
          else
            echo "ERROR: No build output folder found."
            ls -la
            exit 1
          fi

      - name: Verify index.html is a valid production build
        shell: bash
        run: |
          OUTPUT_DIR="${{ steps.output.outputs.dir }}"
          INDEX="${OUTPUT_DIR}index.html"

          if [ ! -f "$INDEX" ]; then
            echo "ERROR: $INDEX does not exist!"
            echo "Contents of $OUTPUT_DIR:"
            ls -la "$OUTPUT_DIR"
            exit 1
          fi

          echo "=== Contents of $INDEX ==="
          cat "$INDEX"

          # Fail if the file still references tsx source files
          if grep -q "src/routes" "$INDEX"; then
            echo "ERROR: index.html still points to .tsx source files!"
            exit 1
          fi

          # Fail if there are no <script> tags with hashed asset bundles
          if ! grep -q "assets/index" "$INDEX"; then
            echo "ERROR: index.html does not contain production JS bundle references!"
            exit 1
          fi

          echo "✓ index.html is a valid production build."

      - name: Add .htaccess SPA fallback for Hostinger
        shell: bash
        run: |
          OUTPUT_DIR="${{ steps.output.outputs.dir }}"
          cat > "${OUTPUT_DIR}.htaccess" <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF
          echo "✓ .htaccess written to ${OUTPUT_DIR}"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ${{ steps.output.outputs.dir }}
          server-dir: ./
