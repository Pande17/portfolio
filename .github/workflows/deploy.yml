name: Deploy FeriDW Portfolio to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Detect build output folder
        id: output
        shell: bash
        run: |
          echo "Checking build output..."

          if [ -d "dist/client" ]; then
            echo "dir=dist/client/" >> "$GITHUB_OUTPUT"
            echo "Using dist/client/"
          elif [ -d ".output/public" ]; then
            echo "dir=.output/public/" >> "$GITHUB_OUTPUT"
            echo "Using .output/public/"
          elif [ -d "dist" ]; then
            echo "dir=dist/" >> "$GITHUB_OUTPUT"
            echo "Using dist/"
          else
            echo "Build output folder not found."
            echo "Available folders:"
            ls -la
            exit 1
          fi

      - name: Add Hostinger SPA fallback
        shell: bash
        run: |
          OUTPUT_DIR="${{ steps.output.outputs.dir }}"

          cat > "${OUTPUT_DIR}.htaccess" <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ${{ steps.output.outputs.dir }}
          server-dir: ./
