name: Deploy FeriDW Portfolio to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Detect build output folder
        id: output
        shell: bash
        run: |
          if [ -f "dist/client/index.html" ]; then
            echo "dir=dist/client/" >> "$GITHUB_OUTPUT"
            echo "Using dist/client/"
          elif [ -f ".output/public/index.html" ]; then
            echo "dir=.output/public/" >> "$GITHUB_OUTPUT"
            echo "Using .output/public/"
          elif [ -f "dist/index.html" ]; then
            echo "dir=dist/" >> "$GITHUB_OUTPUT"
            echo "Using dist/"
          else
            echo "No valid production index.html found."
            find . -name index.html
            exit 1
          fi

      - name: Validate production index.html
        shell: bash
        run: |
          OUTPUT_DIR="${{ steps.output.outputs.dir }}"
          head -n 50 "${OUTPUT_DIR}index.html"

          if grep -q "../src/" "${OUTPUT_DIR}index.html"; then
            echo "Invalid build: index.html still references ../src/"
            exit 1
          fi

          if grep -q ".tsx" "${OUTPUT_DIR}index.html"; then
            echo "Invalid build: index.html still references TSX source file"
            exit 1
          fi

      - name: Add Hostinger htaccess
        shell: bash
        run: |
          OUTPUT_DIR="${{ steps.output.outputs.dir }}"

          cat > "${OUTPUT_DIR}.htaccess" <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /feridw/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /feridw/index.html [L]
          </IfModule>
          EOF

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ${{ steps.output.outputs.dir }}
          server-dir: /public_html/feridw/
